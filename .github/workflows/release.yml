name: release

# Conventional-commits release flow (release-please).
# On every push to master, release-please maintains a "release PR" that bumps the
# version (version.txt + Cargo.toml + package.json) and the CHANGELOG from the
# commit messages. Merging that PR creates the git tag + GitHub Release — and,
# in the same run, builds and publishes the Docker image to GHCR.
#
# The build runs in THIS workflow (gated on release_created) on purpose: a tag/
# release created with GITHUB_TOKEN does not trigger a separate `release:` event,
# so a standalone publish workflow would never fire.

on:
  push:
    branches: [master]

permissions:
  contents: write # create tags/releases, open the release PR
  pull-requests: write # the release PR
  packages: write # push to GHCR

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        # reads release-please-config.json + .release-please-manifest.json at root

      # Everything below only runs when a release was actually cut.
      - name: Checkout
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: ${{ steps.release.outputs.release_created }}
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        if: ${{ steps.release.outputs.release_created }}
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ steps.release.outputs.release_created }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        if: ${{ steps.release.outputs.release_created }}
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/dueo
          tags: |
            type=semver,pattern={{version}},value=${{ steps.release.outputs.tag_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.release.outputs.tag_name }}
            type=raw,value=latest

      - name: Build and push image
        if: ${{ steps.release.outputs.release_created }}
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
