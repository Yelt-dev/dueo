name: ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dueo-web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: dueo-web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm lint
      - run: pnpm build

  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # rust-embed points at dueo-web/build/, so the front must exist before the
      # crate compiles. Build it first.
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: dueo-web/pnpm-lock.yaml
      - name: Build front (for rust-embed)
        working-directory: dueo-web
        run: |
          pnpm install --frozen-lockfile
          pnpm build
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: dueo-server
      - name: fmt
        working-directory: dueo-server
        run: cargo fmt --check
      - name: clippy
        working-directory: dueo-server
        run: cargo clippy -- -D warnings
      - name: build
        working-directory: dueo-server
        run: cargo build
